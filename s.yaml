edition: 3.0.0
name: AstraSchedule-Go
access: default

vars:
  region: cn-hongkong

resources:
  AstraSchedule-Go:
    component: fc3
    props:
      region: ${vars.region}
      functionName: AstraSchedule-Go
      description: AstraSchedule Go Backend
      runtime: custom
      cpu: 0.5
      memorySize: 512
      diskSize: 10240
      timeout: 300
      internetAccess: true
      instanceConcurrency: 1
      logConfig: auto
      customRuntimeConfig:
        command:
          - /code/AstraScheduleServerGo-linux-amd64
      environmentVariables:
        GIN_MODE: release
        TZ: Asia/Shanghai
        ASTRA_RUN_SERVERLESS: "true"
        ASTRA_DB_TYPE: sqlite
        ASTRA_DB_PATH: /tmp/astra_schedule.db
        ASTRA_SERVER_PORT: "9000"
        ASTRA_SECRET_TOKEN: "${env('ASTRA_SECRET_TOKEN')}"
        ASTRA_APIKEY_APIHOST: "${env('ASTRA_APIKEY_APIHOST')}"
        ASTRA_APIKEY_WEATHER: "${env('ASTRA_APIKEY_WEATHER')}"
        ASTRA_SERVER_DOMAIN: "${env('ASTRA_SERVER_DOMAIN')}"
      triggers:
        - triggerName: http-trigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
