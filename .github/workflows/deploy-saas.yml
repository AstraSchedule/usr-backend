name: Build and Deploy SaaS

on:
  push:
    branches:
      - saas/main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: golang:1.22-buster

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bootstrap
          chmod 777 bootstrap

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap
          path: bootstrap
          retention-days: 1

  deploy-fc:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: bootstrap
          path: build_artifacts

      - name: Package binary
        run: |
          cd build_artifacts
          zip ../code.zip bootstrap

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure credentials
        run: |
          s config add \
            --AccessKeyID "${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}" \
            --AccessKeySecret "${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}" \
            --access default

      - name: Deploy to FC
        env:
          ASTRA_SECRET_TOKEN: ${{ secrets.ASTRA_SECRET_TOKEN }}
          ASTRA_APIKEY_WEATHER: ${{ secrets.ASTRA_APIKEY_WEATHER }}
          ASTRA_APIKEY_JWT_PRIVATE_KEY_PEM: ${{ secrets.ASTRA_APIKEY_JWT_PRIVATE_KEY_PEM }}
        run: s deploy -t s-saas.yaml --function code -y
